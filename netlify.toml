[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".env.example"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["server/**"]
  external_node_modules = ["@netlify/blobs", "busboy", "nodemailer", "googleapis"]

[[redirects]]
  from = "/api/careers"
  to = "/.netlify/functions/careers"
  status = 200
  force = true
